<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO AI 마스터 클래스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #0B1120;
    --bg-sidebar: #141E33;
    --bg-hover: #1C2A47;
    --primary: #3B82F6;
    --text-main: #F1F5F9;
    --text-muted: #94A3B8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
  }

  /* ===== DESKTOP: side nav ===== */
  @media (min-width: 769px) {
    body { display: flex; }
    .sidebar {
      width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      padding: 1.2rem 1rem;
      box-shadow: 4px 0 15px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }
    .header { margin-bottom: 1rem; text-align: center; }
    .header h1 { font-size: 1.4rem; font-weight: 900; color: white; margin-bottom: .3rem; line-height: 1.3; }
    .header p { color: var(--primary); font-size: .9rem; font-weight: 700; }
    .nav-list {
      display: flex; flex-direction: column; gap: .35rem;
      flex: 1; overflow-y: auto; padding-right: .3rem;
    }
    .nav-list::-webkit-scrollbar { width: 3px; }
    .nav-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }
    .nav-btn {
      background: transparent; color: var(--text-muted); border: none;
      padding: .65rem .8rem; font-size: .95rem; font-weight: 500;
      font-family: inherit; text-align: left; border-radius: 8px;
      cursor: pointer; transition: all .2s; display: flex;
      align-items: center; gap: 8px; flex-shrink: 0;
    }
    .nav-btn:hover { background: var(--bg-hover); color: white; }
    .nav-btn.active { background: var(--primary); color: white; font-weight: 700; box-shadow: 0 4px 15px rgba(59,130,246,.4); }
    .nav-btn .step {
      font-size: .7rem; font-weight: 900; background: rgba(255,255,255,.1);
      padding: 3px 7px; border-radius: 5px; flex-shrink: 0;
    }
    .nav-btn.active .step { background: rgba(0,0,0,.2); }
    .content-area { flex: 1; position: relative; }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    /* Hide mobile elements */
    .mobile-top { display: none; }
    .mobile-menu { display: none; }
    .mobile-overlay { display: none; }
  }

  /* ===== MOBILE: top bar + slide menu ===== */
  @media (max-width: 768px) {
    body { display: flex; flex-direction: column; }

    /* Desktop sidebar hidden */
    .sidebar { display: none; }

    /* Mobile top bar */
    .mobile-top {
      background: var(--bg-sidebar);
      padding: .6rem .8rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      border-bottom: 1px solid rgba(255,255,255,.08);
      flex-shrink: 0;
      z-index: 200;
    }
    .mobile-top .hamburger {
      background: none; border: none; color: white;
      font-size: 1.4rem; cursor: pointer; padding: .2rem .4rem;
      border-radius: 6px; transition: background .2s;
    }
    .mobile-top .hamburger:hover { background: rgba(255,255,255,.08); }
    .mobile-top .m-title {
      font-size: .9rem; font-weight: 900; color: white; flex: 1;
    }
    .mobile-top .m-chapter {
      font-size: .65rem; color: var(--primary); font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* Slide-in menu */
    .mobile-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 300;
    }
    .mobile-overlay.open { display: block; }
    .mobile-menu {
      position: fixed; top: 0; left: -300px; bottom: 0; width: 280px;
      background: var(--bg-sidebar); z-index: 301;
      transition: left .25s ease; display: flex; flex-direction: column;
      padding: 1rem; box-shadow: 4px 0 20px rgba(0,0,0,.5);
    }
    .mobile-menu.open { left: 0; }
    .mobile-menu .mm-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: .8rem; padding-bottom: .6rem;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .mobile-menu .mm-title { font-size: 1rem; font-weight: 900; color: white; }
    .mobile-menu .mm-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.3rem; cursor: pointer; padding: .2rem .4rem;
    }
    .mobile-menu .mm-list {
      display: flex; flex-direction: column; gap: .3rem;
      flex: 1; overflow-y: auto;
    }
    .mobile-menu .mm-btn {
      background: transparent; color: var(--text-muted); border: none;
      padding: .6rem .7rem; font-size: .85rem; font-weight: 500;
      font-family: inherit; text-align: left; border-radius: 8px;
      cursor: pointer; transition: all .2s; display: flex;
      align-items: center; gap: 8px;
    }
    .mobile-menu .mm-btn:hover { background: var(--bg-hover); color: white; }
    .mobile-menu .mm-btn.active { background: var(--primary); color: white; font-weight: 700; }
    .mobile-menu .mm-btn .step {
      font-size: .6rem; font-weight: 900; background: rgba(255,255,255,.1);
      padding: 2px 6px; border-radius: 4px;
    }
    .mobile-menu .mm-btn.active .step { background: rgba(0,0,0,.2); }

    .content-area { flex: 1; position: relative; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  }
</style>
</head>
<body>

  <!-- DESKTOP: Side Navigation -->
  <div class="sidebar">
    <div class="header">
      <h1>CEO를 위한<br>AI 마스터 클래스</h1>
      <p>핵심 개념 시각화 과정</p>
    </div>
    <div class="nav-list" id="desktopNav"></div>
  </div>

  <!-- MOBILE: Top Bar -->
  <div class="mobile-top">
    <button class="hamburger" onclick="toggleMenu(true)">☰</button>
    <span class="m-title">CEO AI 마스터 클래스</span>
    <span class="m-chapter" id="mChapterLabel">CH 1</span>
  </div>

  <!-- MOBILE: Overlay + Slide Menu -->
  <div class="mobile-overlay" id="mOverlay" onclick="toggleMenu(false)"></div>
  <div class="mobile-menu" id="mMenu">
    <div class="mm-header">
      <span class="mm-title">목차</span>
      <button class="mm-close" onclick="toggleMenu(false)">✕</button>
    </div>
    <div class="mm-list" id="mobileNav"></div>
  </div>

  <!-- Content -->
  <div class="content-area">
    <iframe id="mainFrame" src="ch1_ai_types_dashboard.html" title="대시보드 화면"></iframe>
  </div>

<script>
  var chapters = [
    { ch: "CH 1", name: "AI의 두 갈래", file: "ch1_ai_types_dashboard.html" },
    { ch: "CH 2", name: "확률의 세계", file: "ch2_probability_dashboard.html" },
    { ch: "CH 3", name: "LLM 파이프라인", file: "ch3_llm_pipeline_dashboard.html" },
    { ch: "CH 4", name: "GPU 인프라", file: "ch4_gpu_dashboard.html" },
    { ch: "CH 5", name: "AI 학습 과정", file: "ch5_training_dashboard.html" },
    { ch: "CH 6", name: "에이전트 아키텍처", file: "ch6_agent_dashboard.html" },
    { ch: "CH 7", name: "AI 에이전트 활용", file: "ch8_agent_usecases_dashboard.html" },
    { ch: "CH 8", name: "AI 시장 지형도", file: "ch7_market_landscape_dashboard.html" },
    { ch: "CH 9", name: "AI의 본질", file: "ch9_ai_essence_dashboard.html" }
  ];

  var currentIdx = 0;

  function buildNavs() {
    var dNav = document.getElementById('desktopNav');
    var mNav = document.getElementById('mobileNav');
    var dHTML = '', mHTML = '';

    for (var i = 0; i < chapters.length; i++) {
      var c = chapters[i];
      var active = i === 0 ? ' active' : '';

      dHTML += '<button class="nav-btn' + active + '" data-idx="' + i + '" onclick="go(' + i + ', this)">' +
        '<span class="step">' + c.ch + '</span> ' + c.name + '</button>';

      mHTML += '<button class="mm-btn' + active + '" data-idx="' + i + '" onclick="go(' + i + ', this)">' +
        '<span class="step">' + c.ch + '</span> ' + c.name + '</button>';
    }

    dNav.innerHTML = dHTML;
    mNav.innerHTML = mHTML;
  }

  function go(idx, btn) {
    currentIdx = idx;
    var c = chapters[idx];

    // Update iframe
    document.getElementById('mainFrame').src = c.file;

    // Update desktop nav
    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
    var dBtns = document.querySelectorAll('.nav-btn[data-idx="' + idx + '"]');
    dBtns.forEach(function(b) { b.classList.add('active'); });

    // Update mobile nav
    document.querySelectorAll('.mm-btn').forEach(function(b) { b.classList.remove('active'); });
    var mBtns = document.querySelectorAll('.mm-btn[data-idx="' + idx + '"]');
    mBtns.forEach(function(b) { b.classList.add('active'); });

    // Update mobile header
    document.getElementById('mChapterLabel').textContent = c.ch;

    // Close mobile menu
    toggleMenu(false);
  }

  function toggleMenu(open) {
    document.getElementById('mOverlay').classList.toggle('open', open);
    document.getElementById('mMenu').classList.toggle('open', open);
  }

  // Keyboard nav
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      if (currentIdx < chapters.length - 1) go(currentIdx + 1);
    }
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      if (currentIdx > 0) go(currentIdx - 1);
    }
    if (e.key >= '1' && e.key <= '9') go(parseInt(e.key) - 1);
  });

  buildNavs();
</script>
</body>
</html>
